name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy source to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "src/,models/,Dockerfile,requirements.txt"
          target: "/opt/bank2-sz042"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e

            # ── Ensure Docker is installed ──
            if ! command -v docker >/dev/null 2>&1; then
              echo ">> Docker not found, installing..."
              DOCKER_SCRIPT_OK=0
              if curl -fsSL --connect-timeout 10 https://get.docker.com -o /tmp/get-docker.sh 2>/dev/null; then
                sudo sh /tmp/get-docker.sh && DOCKER_SCRIPT_OK=1
              fi
              if [ "$DOCKER_SCRIPT_OK" = "0" ]; then
                echo ">> Falling back to system docker.io package..."
                sudo apt-get update -qq
                sudo apt-get install -y -qq docker.io
              fi
              sudo usermod -aG docker "$USER" 2>/dev/null || true
              DOCKER_NEEDS_SUDO=1
            else
              echo ">> Docker already installed"
              DOCKER_NEEDS_SUDO=0
            fi

            # ── Configure Docker registry mirrors ──
            MIRROR_CONF="/etc/docker/daemon.json"
            if [ ! -f "$MIRROR_CONF" ] || ! grep -q "registry-mirrors" "$MIRROR_CONF" 2>/dev/null; then
              echo ">> Configuring Docker registry mirrors..."
              sudo mkdir -p /etc/docker
              sudo tee "$MIRROR_CONF" <<'JSON_EOF'
            {
              "registry-mirrors": [
                "https://docker.m.daocloud.io",
                "https://hub-mirror.c.163.com",
                "https://dockerproxy.com"
              ]
            }
            JSON_EOF
              sudo systemctl restart docker 2>/dev/null || sudo service docker restart 2>/dev/null || true
              sleep 2
            fi

            DOCKER="docker"
            [ "$DOCKER_NEEDS_SUDO" = "1" ] && DOCKER="sudo docker"

            APP="bank2-sz042"
            DEPLOY_DIR="/opt/bank2-sz042"
            PORT_START=8009
            PORT_END=8019
            CONTAINER_PORT=8009

            cd "$DEPLOY_DIR"
            echo ">> Building Docker image..."
            $DOCKER build --build-arg PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple -t "$APP":latest .

            port_in_use() {
              ss -ltnH 2>/dev/null | grep -q ":$1 " && return 0
              $DOCKER ps --format "{{.Ports}}" 2>/dev/null | grep -q ":$1->" && return 0
              return 1
            }
            HOST_PORT=""
            for p in $(seq $PORT_START $PORT_END); do
              if ! port_in_use "$p"; then HOST_PORT="$p"; break; fi
            done
            [ -z "$HOST_PORT" ] && { echo "预留端口区间 $PORT_START-$PORT_END 已全部占用,部署中止"; exit 1; }
            echo ">> 部署到主机端口 $HOST_PORT"

            $DOCKER rm -f "$APP" 2>/dev/null || true
            $DOCKER run -d --name "$APP" --restart unless-stopped -p "${HOST_PORT}:${CONTAINER_PORT}" "$APP":latest

            sleep 5
            curl -fsS "http://localhost:${HOST_PORT}/_stcore/health"
            echo ">> 部署成功: http://${{ secrets.SSH_HOST }}:${HOST_PORT}"
